server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        - id: demo-service
          uri: lb://DEMO-SERVICE # Küçük harf yerine kesinlikle BÜYÜK harf yapın
          predicates:
            - Path=/demo/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true