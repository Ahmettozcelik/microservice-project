spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        - id: demo-service
          uri: lb://DEMO-SERVICE
          predicates:
            - Path=/demo/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

  instance:
    prefer-ip-address: true