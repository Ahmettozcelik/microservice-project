version: '3.8'

services:

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=local
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8761"]
      interval: 10s
      timeout: 5s
      retries: 15

  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      eureka-server:
        condition: service_healthy

  demo-service:
    build: ./demo-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_started
      demo-service:
        condition: service_started