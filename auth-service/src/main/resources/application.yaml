server:
  port: 8083

spring:
  application:
    name: auth-service

management:
  endpoints:
    web:
      exposure:
        include: "*"

---
# DOCKER PROFILI AYARLARI BURADAN BAŞLIYOR
spring:
  config:
    activate:
      on-profile: docker
    import: "configserver:http://config-server:8888" # optional: ekini kaldırdık

  data:
    mongodb:
      uri: mongodb://mongo:27017/auth_db

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
    register-with-eureka: true
    fetch-registry: true
